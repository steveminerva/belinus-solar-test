<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinus — My Energyscan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* Belinus brand — matches offerte template QT2025-000183 */
  :root {
    --cyan: #05ade5; --black: #0b0d0f; --ink: #212629; --grey: #8c9499;
    --light: #f2f4f5; --rule: #e0e4e6; --paper: #ffffff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Inter, Helvetica, Arial, sans-serif; background: var(--light); color: var(--ink); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .bel-widget { max-width: 1020px; margin: 0 auto; }

  .band {
    background: var(--black); color: #fff; padding: 34px 48px 30px;
    border-bottom: 2px solid var(--cyan);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .band img.logo, .band svg.logo { height: 44px; width: auto; display: block; }
  .band .wordmark { color: var(--cyan); font-weight: 700; font-size: 2rem; letter-spacing: -.02em; }
  .band .co { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: #9ea6ab; margin-top: 12px; line-height: 1.7; }
  .band .co b { color: #fff; }
  .band .right { text-align: right; }
  .band .right .title { font-size: 2.1rem; font-weight: 300; color: #fff; }
  .band .right .sub { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: #b8bfc4; margin-top: 6px; }
  .lang { margin-top: 12px; }
  .lang button {
    background: none; border: 1px solid #3a4147; color: #b8bfc4; padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: .66rem; font-weight: 700; cursor: pointer;
  }
  .lang button.on { border-color: var(--cyan); color: var(--cyan); }
  .scanSel { margin-top: 14px; width: auto; max-width: 300px; background: #14171a; color: #b8bfc4;
             border: 1px solid #3a4147; font-family: 'JetBrains Mono', monospace; font-size: .64rem;
             padding: 6px 8px; display: block; }

  .inner { padding: 34px 48px 48px; background: var(--paper); }
  .tableWrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 640px) {
    .band, .inner { padding-left: 20px; padding-right: 20px; }
    .band { flex-direction: column; align-items: flex-start; gap: 18px; padding-top: 24px; padding-bottom: 22px; }
    .band .right { text-align: left; }
    .band .right .title { font-size: 1.45rem; }
    .band img.logo { height: 36px; }
    .calc { padding: 30px 20px; }
    h1 { font-size: 1.35rem; }
    iframe.cad { height: 320px; }
    table.offerte { min-width: 560px; }
    .totaal-band { padding: 12px 14px; }
    .totaal-band .v { font-size: 1.05rem; }
    .kpi b { font-size: 1.05rem; }
    button.primary { width: 100%; }
  }

  h1 { font-size: 1.7rem; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
  .sub { color: var(--grey); margin: 0 0 26px; font-size: .95rem; }
  h2.lbl {
    font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase; color: var(--cyan); margin: 34px 0 14px;
  }
  .steps { display: flex; gap: 6px; margin: 0 0 26px; }
  .steps div { flex: 1; height: 3px; background: var(--rule); }
  .steps div.done { background: var(--cyan); }
  .hidden { display: none !important; }

  /* input wizard */
  #wiz0 { text-align: center; padding: 40px 0 26px; }
  #wiz0 h1 { font-size: 2.1rem; margin-bottom: 10px; }
  .backLink { display: inline-block; margin: 26px 22px 0 0; font-family: 'JetBrains Mono', monospace;
              font-size: .7rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
              color: var(--grey); cursor: pointer; user-select: none; }
  .backLink:hover { color: var(--cyan); }

  /* progress screen: only the currently active stage is visible */
  #step-progress.solo .stage:not(.active) { display: none; }

  label {
    display: block; font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--grey); margin: 18px 0 6px;
  }
  input, select {
    width: 100%; padding: 11px 12px; border: 1px solid var(--rule); border-radius: 0;
    font-size: .95rem; font-family: 'JetBrains Mono', monospace; background: var(--paper); color: var(--ink);
  }
  input:focus, select:focus { outline: none; border-color: var(--cyan); }
  .row { display: flex; gap: 16px; } .row > div { flex: 1; }
  @media (max-width: 640px) { .row { flex-direction: column; gap: 0; } }

  button.primary {
    background: var(--cyan); color: #fff; border: none; padding: 14px 34px;
    font-family: 'JetBrains Mono', monospace; font-size: .74rem; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; cursor: pointer; margin-top: 26px;
  }
  button.primary:hover { background: #0895c6; }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }

  .calc { background: var(--black); color: #fff; padding: 46px 48px; border-bottom: 2px solid var(--cyan); }
  .calc h2 { font-weight: 300; font-size: 1.6rem; margin: 0 0 6px; }
  .calc .csub { color: #9ea6ab; font-size: .9rem; margin-bottom: 34px; }
  .stage { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid #1e2225;
           font-family: 'JetBrains Mono', monospace; font-size: .82rem; color: #6e767b; }
  .stage.active { color: #fff; }
  .stage.done { color: var(--cyan); }
  .dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid currentColor; flex-shrink: 0; }
  .stage.done .dot { background: var(--cyan); border-color: var(--cyan); }
  .spinner { width: 11px; height: 11px; border: 1.5px solid #2a2f33; border-top-color: var(--cyan); border-radius: 50%;
             animation: spin 1s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fact { margin-top: 34px; padding: 20px 24px; background: #14171a; border-left: 3px solid var(--cyan); }
  .fact .fl { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .22em; color: var(--cyan); margin-bottom: 8px; }
  .fact .ft { color: #d6dbde; font-size: .92rem; line-height: 1.55; min-height: 3em; transition: opacity .4s; }

  iframe.cad { width: 100%; height: 500px; border: 1px solid var(--rule); background: var(--black); }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin: 18px 0; }
  .kpi { background: var(--paper); padding: 18px 12px; text-align: center; }
  .kpi b { display: block; font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; color: var(--ink); font-weight: 700; }
  .kpi span { font-family: 'JetBrains Mono', monospace; font-size: .56rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); }

  table.offerte { width: 100%; border-collapse: collapse; }
  table.offerte th { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .18em; color: var(--grey);
                     text-align: right; padding: 8px 6px; border-bottom: 1px solid var(--rule); }
  table.offerte th:nth-child(1), table.offerte th:nth-child(2) { text-align: left; }
  table.offerte td { padding: 14px 6px; border-bottom: 1px solid var(--rule); font-size: .9rem; }
  table.offerte td.num { font-family: 'JetBrains Mono', monospace; color: var(--cyan); }
  table.offerte td.desc { font-weight: 600; }
  table.offerte td.r { text-align: right; font-family: 'JetBrains Mono', monospace; }
  table.offerte td.tot-l { text-align: right; color: var(--grey); font-size: .85rem; }
  .totaal-band { display: flex; justify-content: space-between; align-items: center; background: var(--black);
                 border-left: 3px solid var(--cyan); color: #fff; padding: 14px 20px; margin-top: 14px; }
  .totaal-band .t { font-family: 'JetBrains Mono', monospace; font-size: .7rem; letter-spacing: .22em; }
  .totaal-band .v { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; }
  .deposit { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: .74rem; color: var(--grey); margin-top: 10px; }
  .pdfLink { display: inline-block; margin-top: 14px; color: var(--cyan); font-family: 'JetBrains Mono', monospace;
             font-size: .7rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }

  .plans { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .plan { border: 1px solid var(--rule); padding: 24px; cursor: pointer; transition: all .15s; background: var(--paper); }
  .plan:hover { border-color: var(--cyan); }
  .plan.selected { border-color: var(--cyan); box-shadow: inset 0 0 0 1px var(--cyan); background: #f4fbfe; }
  .plan h3 { margin: 0 0 10px; font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--grey); }
  .plan .big { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .plan .psub { font-size: .78rem; color: var(--grey); margin-top: 4px; }
  .plan ul { padding-left: 18px; margin: 14px 0 0; font-size: .84rem; color: #4a5459; line-height: 1.6; }
  .badge { display: inline-block; background: var(--cyan); color: #fff; font-size: .56rem; font-weight: 700; letter-spacing: .1em; padding: 3px 8px; margin-left: 8px; vertical-align: middle; }

  /* hardware catalog */
  .hwToggle { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .hwToggle button { flex: 1; min-width: 210px; padding: 13px 10px; background: var(--paper); border: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace; font-size: .66rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--grey); cursor: pointer; }
  .hwToggle button.on { border-color: var(--cyan); color: var(--cyan); box-shadow: inset 0 0 0 1px var(--cyan); background: #f4fbfe; }
  .hw { border: 1px solid var(--rule); }
  .hwRow { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 13px 16px;
           border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
  .hwRow:last-child { border-bottom: none; }
  .hwRow .n { font-weight: 600; font-size: .92rem; }
  .hwRow .d { color: var(--grey); font-size: .78rem; }
  .wty { font-family: 'JetBrains Mono', monospace; font-size: .6rem; font-weight: 700; color: var(--cyan);
         border: 1px solid var(--cyan); padding: 3px 8px; letter-spacing: .06em; white-space: nowrap; }
  .sheetLink { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--grey); white-space: nowrap; }
  .promo { margin-top: 14px; padding: 18px 22px; background: var(--black); color: #fff; border-left: 3px solid var(--cyan);
           display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .promo .pl { font-family: 'JetBrains Mono', monospace; font-size: .58rem; letter-spacing: .22em; color: var(--cyan); }
  .promo .pt { margin-top: 6px; font-size: .93rem; line-height: 1.5; }
  .promo .cowboy { font-weight: 800; letter-spacing: .38em; font-size: 1.1rem; font-family: Inter, sans-serif; }
  .usps { margin-top: 14px; border: 1px solid var(--cyan); padding: 18px 22px; background: #f4fbfe; }
  .usps .dl { font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700; letter-spacing: .14em;
              color: var(--cyan); text-transform: uppercase; }
  .usps ul { margin: 10px 0 0; padding-left: 18px; font-size: .86rem; line-height: 1.75; color: #2a3438; }

  /* kit selection cards */
  .kits { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; align-items: start; }
  .kit { border: 1px solid var(--rule); padding: 22px; cursor: pointer; transition: all .15s; background: var(--paper); }
  .kit:hover { border-color: var(--cyan); }
  .kit.selected { border-color: var(--cyan); box-shadow: inset 0 0 0 1px var(--cyan); background: #f4fbfe; }
  .kit h3 { margin: 0 0 6px; font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--grey); }
  .kit.selected h3 { color: var(--cyan); }
  .kitName { font-size: .82rem; font-weight: 700; color: var(--ink); letter-spacing: .04em; margin-bottom: 10px; }
  .kitHw { margin: 12px 0; background: var(--paper); }
  .kitPromo { margin-top: 12px; padding: 14px 16px; background: var(--black); border-left: 3px solid var(--cyan); }
  .kitPromoLbl { font-size: .58rem; letter-spacing: .22em; color: var(--cyan); font-weight: 700; }
  .kitPrices { margin-top: 8px; }
  .strike { text-decoration: line-through; color: var(--grey); font-size: .9rem; margin-right: 10px; }
  .promoPrice { color: var(--cyan); font-size: 1.25rem; font-weight: 700; }
  .kitUsps { margin: 12px 0 0; padding-left: 18px; font-size: .86rem; line-height: 1.75; color: #2a3438; }
  .kitDelivery { margin-top: 10px; font-size: .66rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--cyan); }
  .kitCta { width: 100%; margin-top: 14px; }
  .kitTrust { text-align: center; margin-top: 10px; }
  .kpi span.kpiTrees { display: block; font-size: .58rem; color: var(--grey); margin-top: 5px; text-transform: none; letter-spacing: .02em; }
  .ctaRow { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  button.ghost { background: none; border: 1px solid var(--cyan); color: var(--cyan); }
  button.ghost:hover { background: #f4fbfe; }
  .modal { position: relative; }
  .modalX { position: absolute; top: 12px; right: 16px; cursor: pointer; color: #8c9499; font-size: 1rem; line-height: 1; }
  .modalX:hover { color: #fff; }
  .modalLink { display: inline-block; margin-top: 18px; color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: .64rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }

  /* demo mode */
  .demoBar { background: #c81e1e; color: #fff; text-align: center; padding: 8px 12px;
             font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
  .demoRed { color: #c81e1e; font-weight: 700; }
  .demoNote { border: 1px dashed #c81e1e; color: #c81e1e; padding: 12px 16px; margin-top: 14px;
              font-size: .82rem; line-height: 1.6; background: #fff5f5; }
  .paySummary { display: flex; justify-content: space-between; align-items: center; background: var(--black);
                border-left: 3px solid var(--cyan); color: #fff; padding: 16px 20px; margin: 6px 0 10px; }
  .paySummary .t { font-family: 'JetBrains Mono', monospace; font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; }
  .paySummary .v { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 700; }
  .invoiceBox { border: 1px solid var(--cyan); background: #f4fbfe; padding: 22px 26px; margin: 22px auto 0; max-width: 560px; text-align: left; }
  .invoiceBox .in { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.05rem; }
  .paidBadge { display: inline-block; background: var(--cyan); color: #fff; font-family: 'JetBrains Mono', monospace;
               font-size: .62rem; font-weight: 700; letter-spacing: .14em; padding: 4px 10px; margin-left: 10px; vertical-align: middle; }

  .modalWrap { position: fixed; inset: 0; background: rgba(11,13,15,.78); display: flex;
               align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--black); color: #fff; max-width: 480px; width: 100%; padding: 44px 38px;
           text-align: center; border-top: 3px solid var(--cyan); }
  .modal .cowboy { font-weight: 800; letter-spacing: .38em; font-size: 1.7rem; font-family: Inter, sans-serif; }
  .modal p { margin: 20px 0 0; line-height: 1.65; color: #d6dbde; font-size: .96rem; }
  .modal .prize { color: var(--cyan); font-weight: 700; }

  .termsBox { max-height: 220px; overflow-y: auto; border: 1px solid var(--rule); padding: 14px 18px;
              font-size: .78rem; color: #4a5459; margin-top: 16px; line-height: 1.65; background: var(--paper); }
  .termsBox b { color: var(--ink); }
  .agreeRow { display: flex; align-items: flex-start; gap: 10px; margin-top: 18px; font-size: .82rem; line-height: 1.5; }
  .agreeRow input { width: auto; margin-top: 3px; }

  .qmark { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px;
           border: 1px solid var(--cyan); border-radius: 50%; color: var(--cyan); font-size: .62rem;
           margin-left: 8px; cursor: pointer; vertical-align: middle; user-select: none; }
  .qmark:hover { background: var(--cyan); color: #fff; }

  .error { border-left: 3px solid #c0392b; background: #fdf1ef; color: #9b1c1c; padding: 14px 18px; margin-top: 16px; font-size: .9rem; }
  .note { font-size: .76rem; color: var(--grey); margin-top: 14px; line-height: 1.6; }
  .success { text-align: center; padding: 46px 20px; }
  .success .check { width: 54px; height: 54px; margin: 0 auto 18px; border-radius: 50%; background: var(--cyan); color: #fff; font-size: 1.7rem; line-height: 54px; }
</style>
</head>
<body>
<div class="bel-widget">

  <div class="demoBar" data-i18n="demoBar"></div>

  <div class="band">
    <div>

      <!-- Admin/testing: load a previous energy scan by its unique id -->
      <select id="scanSel" class="scanSel" title="Admin — load previous energy scan"><option value="" data-i18n="scanNew"></option></select>
    </div>
    <div class="right">

let LANG = "en";
const t = (k) => I18N[LANG][k];

function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const v = I18N[LANG][el.dataset.i18n];
    if (typeof v === "string") el.textContent = v;
  });
  document.documentElement.lang = LANG;
  $("langEn").classList.toggle("on", LANG === "en");
  $("langNl").classList.toggle("on", LANG === "nl");
  if (typeof updateEvKm === "function") updateEvKm();
  // re-render dynamic content if a quote is on screen
  if (S.quote) renderQuote(S.quote);
}
function setLang(l) { LANG = l; applyLang(); }

const S = { projectId: null, designId: null, leadId: null, quote: null, quoteId: null, plan: null, capWp: null, catalog: "stock", lastBody: null };

async function setCatalog(c) {
  if (!S.lastBody || c === S.catalog || S.catBusy) return;
  S.catalog = c;
  // Instant feedback: highlight the clicked card immediately.
  $("kitStock").classList.toggle("selected", c === "stock");
  $("kitNew").classList.toggle("selected", c === "new");
  // Quote for this kit already fetched → render it without a backend call.
  if (S.quoteByCat && S.quoteByCat[c]) {
    S.quote = S.quoteByCat[c]; S.quoteId = S.quote.quote_id;
    renderQuote(S.quote);
    return;
  }
  S.catBusy = true;
  document.body.style.cursor = "progress";
  try {
    const quote = await api("POST", "quote", { ...S.lastBody, catalog: c });
    S.quote = quote; S.quoteId = quote.quote_id;
    renderQuote(quote);
  } catch (e) {
    showError("progressError", e.message);
  }
  document.body.style.cursor = "";
  S.catBusy = false;
}
const fmt = new Intl.NumberFormat("nl-BE", { style: "currency", currency: "EUR", maximumFractionDigits: 0 });
const fmt2 = new Intl.NumberFormat("nl-BE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const $ = (id) => document.getElementById(id);

async function api(method, route, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API_BASE}/${route}`, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(typeof data.error === "string" ? data.error : JSON.stringify(data.error || data));
  return data;
}
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

async function poll(route, isDone, { interval = 3000, timeout = 300000 } = {}) {
  const t0 = Date.now();
  while (Date.now() - t0 < timeout) {
    const r = await api("GET", route);
    if (r.error && r.status === "failed") throw new Error(r.error);
    if (isDone(r)) return r;
    await sleep(interval);
  }
  throw new Error(t("timeout"));
}

const STEPS = ["step-input", "step-progress", "step-result", "step-quote", "step-call", "step-sign", "step-checkout", "step-done"];
function show(stepId) {
  STEPS.forEach((s, i) => {
    $(s).classList.toggle("hidden", s !== stepId);
    $("s" + Math.min(i + 1, 4))?.classList.toggle("done", STEPS.indexOf(stepId) >= i);
  });
  $("step-input").parentElement.classList.toggle("hidden", stepId !== "step-input");
  // COWBOY promo: auto-open once per scan, 10 s after the result page first shows
  if (stepId === "step-result" && !S.cowboyShown) {
    S.cowboyShown = true;
    setTimeout(() => {
      if (!$("step-result").classList.contains("hidden")) openCowboy(false);
    }, 10000);
  }
}

function setStageLabels(set) {
  document.querySelectorAll(".stage span[data-i18n]").forEach((el, i) => {
    el.dataset.i18n = (set === "B" ? "stageB" : "stage") + i;
    el.textContent = t(el.dataset.i18n);
  });
}

function setStage(n, state) {
  document.querySelectorAll(".stage").forEach((el) => {
    const i = +el.dataset.stage;
    el.classList.toggle("done", i < n || (i === n && state === "done"));
    el.classList.toggle("active", i === n && state === "active");
    el.querySelector(".dot, .spinner").className = (i === n && state === "active") ? "spinner" : "dot";
  });
}

let factTimer = null;
function startFacts(interval = 9000) {
  // start with the 5 belinus brand messages (last block of the array), then rotate through all
  let i = I18N[LANG].facts.length - 5;
  const el = $("factText");
  const next = () => {
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = I18N[LANG].facts[i % I18N[LANG].facts.length]; el.style.opacity = 1; i++; }, 400);
  };
  next();
  factTimer = setInterval(next, interval);
}
function stopFacts() { clearInterval(factTimer); }

// -------- main flow --------
$("btnStart").onclick = async () => {
  storeProfile();
  S.cowboyShown = false; S.promoShown = false; S.quoteByCat = {};
  const street = $("street").value.trim(), city = $("city").value.trim(), postal = $("postal").value.trim();
  const annualKwh = +$("annualKwh").value;
  S.contact = {
    first_name: $("fname").value.trim(), last_name: $("lname").value.trim(),
    email: $("email").value.trim(), phone: $("phone").value.trim(),
  };
  if (!($("chkPrivacy").checked && $("chkMail").checked)) {
    return showError("inputError", t("errConsent"));
  }
  if (!S.contact.first_name || !S.contact.last_name || !/.+@.+\..+/.test(S.contact.email)) {
    return showError("inputError", t("errContact"));
  }
  if (!street || !city || !postal) { showWiz(0); return showError("inputError", t("errAddress")); }
  if (!annualKwh || annualKwh < 500) { showWiz(1); return showError("inputError", t("errKwh")); }
  $("inputError").classList.add("hidden");

  // admin: previously calculated scan → straight to the stored result (no Aurora consumption)
  if (S.loadedScan && S.quote) {
    renderQuote(S.quote);
    if (!S.quote.system.existing_panels && S.designId) {
      api("POST", "cad-url", { design_id: S.designId }).then((r) => { $("cadFrame").src = r.url; }).catch(() => {});
    }
    show("step-result");
    return;
  }

  // New scans always open the result page on the Standard kit.
  S.catalog = "stock";

  const evHave = $("evHave").value === "1";
  const evWant = !evHave && $("evWant").value === "1";
  const evActive = evHave || evWant;
  const evKwh = evActive ? (+$("evKwh").value || 2500) : 0;
  const hasPanels = $("hasPanels").value === "1";
  const phase = $("phase").value;

  const evBody = {
    phase,
    ev_present: evHave, ev_add_charger: evWant,
    ev_annual_kwh: evKwh, ev_company: evActive && $("evCompany").value === "1",
  };

  // ---- Branch B: customer already has panels → battery/EV energy scan ----
  if (hasPanels) {
    const existingWp = +$("existingWp").value || 0;
    if (existingWp < 500) { showWiz(2); return showError("inputError", t("errWp")); }
    $("btnStart").disabled = true;
    setStageLabels("B");
    setStage(0, "active");
    show("step-progress");
    startFacts(5500); // all 5 brand messages fit within the scan
    try {
      // real work runs in the background while the scan stages animate
      const work = (async () => {
        const lead = await api("POST", "lead", { address: `${street}, ${city}, ${postal}` });
        S.leadId = lead.lead_id; S.designId = null;
        S.lastBody = {
          lead_id: S.leadId, existing_panels: true, existing_wp: existingWp,
          annual_consumption_kwh: annualKwh, ...evBody,
        };
        return await api("POST", "quote", { ...S.lastBody, catalog: S.catalog });
      })();
      for (let i = 0; i < 4; i++) {
        setStage(i, "active");
        await sleep(7000);
        setStage(i, "done");
      }
      const quote = await work;
      S.quote = quote; S.quoteId = quote.quote_id;
      stopFacts();
      renderQuote(quote);
      show("step-result");
    } catch (e) {
      stopFacts();
      showError("progressError", e.message);
      $("btnStart").disabled = false;
    }
    return;
  }

  // ---- Branch A: new panel design via Aurora ----
  $("btnStart").disabled = true;
  setStageLabels("A");
  show("step-progress");
  startFacts();

  try {
    setStage(0, "active");
    const start = await api("POST", "start", { street, city, postal_code: postal });
    Object.assign(S, { projectId: start.project_id, designId: start.design_id, leadId: start.lead_id });

    // Total consumption incl. EV home charging — sizes the system accordingly,
    // capped by the meter type (single phase 5.000 Wp / three phase 10.000 Wp).
    const totalKwh = annualKwh + evKwh;
    const capWp = phase === "single" ? 5000 : 10000;
    const targetKwh = Math.min(totalKwh, Math.round((capWp / 1000) * 950));
    S.capWp = capWp;
    const consumptionP = api("PUT", "consumption", { project_id: S.projectId, annual_kwh: totalKwh });

    await poll(`design-status?design_id=${S.designId}`, (r) => r.ready);
    setStage(0, "done");

    setStage(1, "active");
    const roof = await api("POST", "ai-roof/run", { design_id: S.designId });
    await poll(`ai-roof/status?design_id=${S.designId}&job_id=${roof.job_id}`, (r) => {
      if (r.status === "failed") throw new Error(r.error || "Roof analysis failed");
      return r.status === "succeeded";
    });
    await consumptionP;
    setStage(1, "done");

    // AutoDesigner — attempt 1: energy mode with full components (production).
    // Attempt 2: max_fit with panels only (works everywhere, incl. sandbox).
    setStage(2, "active");
    const attempts = [
      { mode: "energy", panels_only: false },
      { mode: "max_fit", panels_only: true },
    ];
    for (let i = 0; i < attempts.length; i++) {
      const a = attempts[i];
      const ad = await api("POST", "autodesigner/run", {
        design_id: S.designId, target_kwh: targetKwh, mode: a.mode, panels_only: a.panels_only,
      });
      try {
        await poll(`autodesigner/status?design_id=${S.designId}&job_id=${ad.job_id}`, (r) => {
          if (r.status === "failed") throw new Error(r.error || "AutoDesigner failed");
          return r.status === "succeeded";
        }, { timeout: 600000 });
        break;
      } catch (e) {
        if (i === attempts.length - 1) throw new Error((e.message || "") + t("designFailed"));
      }
    }
    setStage(2, "done");

    setStage(3, "active");
    const [cad, sim] = await Promise.all([
      api("POST", "cad-url", { design_id: S.designId }),
      api("POST", "simulation/run", { design_id: S.designId }),
    ]);
    $("cadFrame").src = cad.url;
    await poll(`simulation/status?design_id=${S.designId}&job_id=${sim.job_id}`, (r) => {
      if (r.status === "failed") throw new Error(r.error || "Simulation failed");
      return r.status === "succeeded";
    });
    setStage(3, "done");

    S.lastBody = {
      design_id: S.designId, lead_id: S.leadId,
      annual_consumption_kwh: annualKwh, ...evBody,
    };
    const quote = await api("POST", "quote", { ...S.lastBody, catalog: S.catalog });
    S.quote = quote; S.quoteId = quote.quote_id;
    stopFacts();
    renderQuote(quote);
    show("step-result");
  } catch (e) {
    stopFacts();
    showError("progressError", e.message);
    $("btnStart").disabled = false;
  }
};

let chartInstance = null;
let energyChartInstance = null;

// Datasheets hosted on GitHub Pages — absolute URLs + download attribute.
const SHEETS_BASE = "https://steveminerva.github.io/belinus-solar-test/datasheets/";

// Force datasheet downloads: fetch as blob → object URL. The plain `download`
// attribute is silently ignored with target="_blank" in some browsers and
// whenever the widget is embedded on another domain.
document.addEventListener("click", async (e) => {
  const a = e.target.closest && e.target.closest("a.sheetLink");
  if (!a) return;
  e.preventDefault(); e.stopPropagation();
  try {
    const res = await fetch(a.href);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const dl = document.createElement("a");
    dl.href = url;
    dl.download = decodeURIComponent((a.href.split("/").pop() || "datasheet.pdf"));
    document.body.appendChild(dl); dl.click(); dl.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (_) { window.open(a.href, "_blank"); }
});

function compRows(q) {
  return (q.components || []).map((c) => `
    <div class="hwRow">
      <div><div class="n">${c.name}</div>${c.detail ? `<div class="d">${c.detail}</div>` : ""}</div>
      <div style="display:flex;gap:10px;align-items:center">
        ${c.warranty ? `<span class="wty">${c.warranty}${/warranty|garantie/i.test(c.warranty) ? "" : (LANG === "nl" ? " garantie" : " warranty")}</span>` : ""}
        ${c.sheet ? `<a class="sheetLink" href="${SHEETS_BASE}${encodeURIComponent(c.sheet)}" download target="_blank">${t("sheet")}</a>` : ""}
      </div>
    </div>`).join("");
}

// Two selectable kit cards: only the selected card shows the full component
// list + pricing; the unselected card shows only the kit name + its teaser.
function renderKits(qt) {

  $("kitStockTitle").textContent = t("kitStockTitle");
  $("kitNewTitle").textContent = t("kitNewTitle");
  $("kitStockName").textContent = (S.quoteByCat.stock && S.quoteByCat.stock.system.kit_name) || t("kitStockName");
  $("kitNewName").textContent = (S.quoteByCat.new && S.quoteByCat.new.system.kit_name) || t("kitNewName");
  $("kitStock").classList.toggle("selected", !isNew);
  $("kitNew").classList.toggle("selected", isNew);

  }

    sb += `<div class="note kitTrust">${t("trustLine")}</div>`;
  }
  $("kitStockBody").innerHTML = sb;

  // Pro card: USPs + delivery + €100 reservation (always) + components when selected
  const nq = S.quoteByCat.new;
  let nb = "";
  if (isNew) {
    nb += `<div class="hw kitHw">${compRows(qt)}</div>`;
    nb += `<div class="kitPrices"><span class="promoPrice mono">€ ${fmt2.format(qt.price.total_incl_vat)}</span></div>`;
  }
  nb += `<ul class="kitUsps">${I18N[LANG].kitUsps.map((u) => `<li>${u}</li>`).join("")}</ul>`;
  nb += `<div class="kitDelivery mono">${I18N[LANG].delivery((nq && nq.system.delivery) || "Q2 2027")}</div>`;
  nb += `<div class="note">${t("reserveNote")}</div>`;

    nb += `<button class="primary kitCta" id="kitNewOrder">${t("btnReserveNow")}</button>`;
    nb += `<div class="note kitTrust">${t("trustLine")}</div>`;
  }
  $("kitNewBody").innerHTML = nb;

  // In-card CTA (only rendered in the selected block) → order flow.
  if (!isNew) $("kitStockOrder").onclick = (e) => { e.stopPropagation(); orderKit("stock"); };
  if (isNew) $("kitNewOrder").onclick = (e) => { e.stopPropagation(); orderKit("new"); };

async function orderKit(c) {
  if (S.catalog !== c) await setCatalog(c);
  if (S.catalog === c && S.quote) goQuote();
}

function renderQuote(qt) {
  S.quoteByCat[qt.system.catalog] = qt;
  const noDesign = qt.system.existing_panels;
  $("designLbl").classList.toggle("hidden", noDesign);
  $("cadFrame").classList.toggle("hidden", noDesign);

  if (!noDesign && S.capWp && qt.system.kwp * 1000 > S.capWp + 200) {
    $("capNote").textContent = I18N[LANG].capNote(qt.system.kwp.toFixed(2), (S.capWp / 1000).toFixed(1));
    $("capNote").classList.remove("hidden");
  } else {
    $("capNote").classList.add("hidden");
  }

  // Systeemgrootte = theoretical panel power (panel count × 500 Wp).
  // Aurora's irradiation-based kWp is used only for production output.
  const sizeKwp = noDesign ? qt.system.kwp : (qt.system.kwp_theoretical ?? qt.system.kwp);
  $("kSize").textContent = sizeKwp.toFixed(2) + (noDesign ? t("existing") : "");
  $("kPanels").textContent = qt.system.panel_count ?? "—";
  $("kProd").textContent = qt.system.annual_production_kwh.toLocaleString("nl-BE");
  $("kBattery").textContent = qt.system.battery.kwh ? qt.system.battery.kwh + " kWh" : t("none");
  // Stock: the price KPI shows the −15% online promo total; the quote page
  // itself keeps the normal list price (rebate only reflects in the payment).
  $("kPrice").textContent = fmt.format(qt.system.catalog === "new"
    ? qt.price.total_incl_vat
    : (qt.price.promo_total_incl_vat ?? qt.price.total_incl_vat));
  $("kSave").textContent = fmt.format(qt.savings.total_30y);

  // CO₂ impact over 30 years: solar production (with degradation) × Belgian
  // grid factor 0,20 kg CO₂/kWh + EV solar km vs petrol car (120 g CO₂/km).
  {
    const deg = qt.assumptions.panel_degradation, N = qt.assumptions.horizon_years;
    const prodTotal = qt.system.annual_production_kwh * (1 - Math.pow(1 - deg, N)) / deg;
    const gridCo2 = prodTotal * 0.20; // kg
    const evCo2 = qt.system.ev_benefit_counted ? qt.system.ev_annual_kwh * 6 * 0.120 * N : 0; // kg
    const tonnes = (gridCo2 + evCo2) / 1000;
    $("kCo2").textContent = tonnes.toLocaleString("nl-BE", { maximumFractionDigits: 1 }) + " ton";
    // ≈ 115 seedlings per 7 tonnes CO₂ (EPA equivalence, 10-year growth)
    $("kCo2Trees").textContent = I18N[LANG].co2Seedlings(Math.round(tonnes * 115 / 7).toLocaleString("nl-BE"));
  }

  $("quoteNumber").textContent = qt.quote_number ?? "";
  $("pdfLink").href = `${API_BASE}/quote-pdf?quote_id=${qt.quote_id}`;

  // ---- two selectable kit blocks ----
  const isNew = qt.system.catalog === "new";
  renderKits(qt);

  let html = `<tr><th>#</th><th>OMSCHRIJVING</th><th>AANTAL</th><th>PRIJS</th><th>BTW</th><th>BEDRAG</th></tr>`;
  qt.items.forEach((it, i) => {
    html += `<tr><td class="num">${String(i + 1).padStart(2, "0")}</td><td class="desc">${it.description}</td>` +
      `<td class="r">${fmt2.format(it.quantity)}</td><td class="r">${fmt2.format(it.unit_price)}</td>` +
      `<td class="r">${(it.vat_rate * 100).toFixed(0)}%</td><td class="r"><b>${fmt2.format(it.amount)}</b></td></tr>`;
  });
  html += `<tr><td colspan="5" class="tot-l">${t("exclVat")}</td><td class="r">${fmt2.format(qt.price.subtotal_excl_vat)}</td></tr>`;
  for (const [rate, g] of Object.entries(qt.price.vat_groups)) {
    html += `<tr><td colspan="5" class="tot-l">${I18N[LANG].vatOn(rate, fmt2.format(g.base))}</td><td class="r">${fmt2.format(g.vat)}</td></tr>`;
  }
  $("offerteTable").innerHTML = html;
  $("totV").textContent = `€ ${fmt2.format(qt.price.total_incl_vat)}`;
  $("depositLine").textContent = qt.price.deposit_label === "reservation"
    ? I18N[LANG].depositReservation(fmt2.format(qt.price.deposit))
    : I18N[LANG].depositLine(fmt2.format(qt.price.deposit));

  const p = qt.plans;
  const finTerm = p.finance.term_months % 12 === 0
    ? `${p.finance.term_months / 12} ${t("years")}` : `${p.finance.term_months} ${t("months")}`;
  const L = I18N[LANG];
  const cards = [
    { key: "buy", title: t("planBuy"), big: fmt.format(p.buy.upfront), sub: t("buySub"),
      items: [L.payback(p.buy.payback_year ?? "–"), L.netBenefit(fmt.format(p.buy.net_benefit_30y)), t("buyOwn")] },
    { key: "rent", title: t("planRent"), big: fmt.format(p.rent.monthly) + t("perMonth"), sub: t("rentSub"),
      items: [t("rentBuyOption"), L.netBenefit(fmt.format(p.rent.net_benefit_30y)), t("rentNoUpfront")] },
    { key: "finance", title: t("planFinance"), big: fmt.format(p.finance.monthly) + t("perMonth"), sub: L.financeSub(finTerm, (p.finance.apr * 100).toFixed(1)),
      items: [L.financeTotal(fmt.format(p.finance.total_cost_30y)), L.netBenefit(fmt.format(p.finance.net_benefit_30y)), t("financeOwn")] },
  ];
  $("btnContinue").textContent = isNew ? t("btnContinueReserve") : t("btnContinue");
  $("reserveCancelNote").textContent = t("reserveCancel");
  $("reserveCancelNote").classList.toggle("hidden", !isNew);

  const best = cards.reduce((a, b) => (p[a.key].net_benefit_30y >= p[b.key].net_benefit_30y ? a : b));
  $("plans").innerHTML = cards.map((c) => `
    <div class="plan${S.plan === c.key ? " selected" : ""}" data-plan="${c.key}">
      <h3>${c.title}${c.key === best.key ? `<span class="badge">${t("badge")}</span>` : ""}</h3>
      <div class="big">${c.big}</div>
      <div class="psub">${c.sub}</div>
      <ul>${c.items.map((i) => `<li>${i}</li>`).join("")}</ul>
    </div>`).join("");

  document.querySelectorAll(".plan").forEach((el) => {
    el.onclick = () => {
      document.querySelectorAll(".plan").forEach((x) => x.classList.remove("selected"));
      el.classList.add("selected");
      S.plan = el.dataset.plan;
      $("btnContinue").disabled = false;
    };
  });

  const years = Array.from({ length: qt.savings.horizon_years }, (_, i) => "Y" + (i + 1));
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart($("chart"), {
    type: "line",
    data: {
      labels: years,
      datasets: [
        { label: t("chartBuy"), data: p.buy.cumulative, borderColor: "#05ade5", backgroundColor: "rgba(5,173,229,.07)", fill: true, tension: .3 },
        { label: t("chartRent"), data: p.rent.cumulative, borderColor: "#9aa39e", tension: .3 },
        { label: t("chartFinance"), data: p.finance.cumulative, borderColor: "#0b0d0f", tension: .3 },
      ],
    },
    options: {
      plugins: { legend: { position: "bottom", labels: { font: { family: "'JetBrains Mono'", size: 10 } } } },
      scales: { y: { ticks: { callback: (v) => fmt.format(v), font: { family: "'JetBrains Mono'", size: 10 } } },
                x: { ticks: { font: { family: "'JetBrains Mono'", size: 10 } } } },
    },
  });

  // ---- energy analysis graph: monthly kWh over the year (line chart) ----
  const cons = (S.lastBody && S.lastBody.annual_consumption_kwh) || 0;
  const batThroughput = Math.round(qt.system.battery.kwh * 300); // ≈300 cycles/year
  // Monthly distribution profiles (fraction of the annual total, sum = 1):
  // Belgian solar irradiation curve, Belgian household consumption curve,
  // flat EV charging; battery throughput follows the solar surplus curve.
  const P_SOLAR = [0.030, 0.050, 0.085, 0.115, 0.125, 0.125, 0.125, 0.110, 0.090, 0.065, 0.045, 0.035];
  const P_CONS = [0.105, 0.095, 0.090, 0.080, 0.070, 0.065, 0.065, 0.065, 0.075, 0.085, 0.095, 0.110];
  const P_FLAT = Array(12).fill(1 / 12);
  const monthly = (annual, prof) => prof.map((f) => Math.round(annual * f));
  if (energyChartInstance) energyChartInstance.destroy();
  energyChartInstance = new Chart($("energyChart"), {
    type: "line",
    data: {
      labels: I18N[LANG].months,
      datasets: [
        { label: t("eProd"), data: monthly(qt.system.annual_production_kwh, P_SOLAR),
          borderColor: "#05ade5", backgroundColor: "rgba(5,173,229,.07)", fill: true, tension: .35 },
        { label: t("eCons"), data: monthly(cons, P_CONS), borderColor: "#0b0d0f", tension: .35 },
        { label: t("eEv"), data: monthly(qt.system.ev_annual_kwh, P_FLAT), borderColor: "#9aa39e", tension: .35 },
        { label: t("eBat"), data: monthly(batThroughput, P_SOLAR), borderColor: "#46B2E9", borderDash: [6, 4], tension: .35 },
      ],
    },
    options: {
      plugins: { legend: { position: "bottom", labels: { font: { family: "'JetBrains Mono'", size: 10 } } } },
      scales: { y: { ticks: { callback: (v) => v.toLocaleString("nl-BE") + " kWh", font: { family: "'JetBrains Mono'", size: 10 } } },
                x: { ticks: { font: { family: "'JetBrains Mono'", size: 10 } } } },
    },
  });

  $("assumptions").textContent = I18N[LANG].assumptions(qt.assumptions, qt.system.ev_benefit_counted, qt.system.ev_company);
}

$("btnContinue").onclick = () => {
  // Digital signing step: quote (stock) or reservation form (new products)
  const isNew = S.quote.system.catalog === "new";
  $("signTitle").textContent = isNew ? t("signTitleReserve") : t("signTitleQuote");
  $("signIntro").textContent = isNew
    ? t("signIntroReserve")
    : I18N[LANG].signIntroQuote(S.quote.quote_number ?? "");
  $("signItems").innerHTML = (S.quote.components || []).map((c) => `
    <div class="hwRow"><div><div class="n">${c.name}</div>${c.detail ? `<div class="d">${c.detail}</div>` : ""}</div>
    ${c.warranty ? `<span class="wty">${c.warranty}${/warranty|garantie/i.test(c.warranty) ? "" : (LANG === "nl" ? " garantie" : " warranty")}</span>` : ""}</div>`).join("");
  $("signTerms").innerHTML = `<b>${t("signTermsTitle")}</b><br>` +
    I18N[LANG].generalTerms.map((x, i) => `${i + 1}. ${x}`).join("<br>");
  $("agreeLbl").textContent = isNew ? t("agreeReserve") : t("agreeQuote");
  $("agreeChk").checked = false;
  $("signName").value = "";
  $("btnSign").textContent = isNew ? t("btnSignReserve") : t("btnSignQuote");
  $("btnSign").disabled = true;
  show("step-sign");
};

function syncSignBtn() {
  $("btnSign").disabled = !($("agreeChk").checked && $("signName").value.trim().length > 2);
}
$("agreeChk").onchange = syncSignBtn;
$("signName").oninput = syncSignBtn;

$("btnSign").onclick = () => {
  // DEMO signature (Sumsub stubbed) → payment page
  S.signature = { name: $("signName").value.trim(), signed_at: new Date().toISOString() };
  const isNew = S.quote.system.catalog === "new";
  const amount = fmt2.format(S.quote.price.deposit);
  $("payFor").textContent = isNew ? t("payForReservation") : t("payForDeposit");
  $("payAmount").textContent = `€ ${amount}`;
  $("cardName").value = `${S.contact.first_name} ${S.contact.last_name}`;
  $("btnOrder").textContent = I18N[LANG].payBtn(`€ ${amount}`);
  document.querySelector('[data-i18n="checkoutNote"]').textContent = isNew ? t("checkoutNoteReserve") : t("checkoutNote");
  show("step-checkout");
};

// COWBOY promo popup (auto-opens 10 s after the result page shows)
function openCowboy() {
  $("cowboyTxt").innerHTML = t("cowboyPromo").replace(/€\s?3\.000/, '<span class="prize">€3.000</span>');
  $("cowboyTerms").textContent = t("cowboyTermsLbl");
  $("cowboyModal").classList.remove("hidden");
}
$("cowboyX").onclick = () => $("cowboyModal").classList.add("hidden");

// -------- result page → quote or call-me --------
function goQuote() {
  show("step-quote");
}

$("btnCallSend").onclick = async () => {
  $("callError").classList.add("hidden");
  const phone = $("callPhone").value.trim();
  if (phone.length < 8) return showError("callError", t("errContact"));
  try {
    await api("POST", "contact", { lead_id: S.leadId, ...S.contact, phone });
    if (S.contact) S.contact.phone = phone;
    const dayTxt = $("callDay").selectedOptions[0] ? $("callDay").selectedOptions[0].textContent : "";
    $("callConfirm").textContent = I18N[LANG].callConfirm(dayTxt, $("callSlot").value);
    $("callConfirm").classList.remove("hidden");
  } catch (e) { showError("callError", e.message); }
};

$("btnOrder").onclick = async () => {
  $("checkoutError").classList.add("hidden");
  $("btnOrder").disabled = true;
  const origLbl = $("btnOrder").textContent;
  $("btnOrder").textContent = t("processing");
  try {
    await api("POST", "contact", { project_id: S.projectId, lead_id: S.leadId, ...S.contact });
    const order = await api("POST", "order", { quote_id: S.quoteId, lead_id: S.leadId, plan: S.plan });
    await sleep(1500); // simulate card processing (DEMO)
    const pay = await api("POST", "pay-demo", { order_id: order.order_id });
    // documents screen: invoice (stock) or product reservation (new) + payment receipt
    $("invNumber").textContent = pay.invoice_number ?? "DEMO";
    const isNew = S.quote.system.catalog === "new";
    $("rcptLine").textContent = I18N[LANG].rcptLine(pay.receipt_number ?? "");
    $("invPaidLine").textContent = I18N[LANG].invPaid(`€ ${fmt2.format(pay.amount_paid ?? S.quote.price.deposit)}`, isNew);
    $("invMailedLine").textContent = I18N[LANG].invMailed(S.contact.email);
    $("invDownloadBtn").textContent = isNew ? t("dlReservation") : t("dlInvoice");
    $("rcptDownloadBtn").textContent = t("dlReceipt");
    $("invDownload").href = `${API_BASE}/invoice-pdf?order_id=${order.order_id}`;
    $("rcptDownload").href = `${API_BASE}/receipt-pdf?order_id=${order.order_id}`;
    show("step-done");
  } catch (e) {
    showError("checkoutError", e.message);
    $("btnOrder").textContent = origLbl;
  }
  $("btnOrder").disabled = false;
};

function showError(id, msg) { const el = $(id); el.textContent = msg; el.classList.remove("hidden"); }

applyLang();
</script>
</body>
</html>
